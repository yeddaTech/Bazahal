<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bazahal</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <div>
            <a href="/" class="nav-link" style="margin-right: 15px;">Home</a>
            <a href="/upload" class="nav-link">+ Aggiungi Prodotto</a>
        </div>
    </nav> 

    <div style="text-align: center; padding: 60px 20px 20px;">
        <h2 style="font-size: 2.5rem; color: var(--emerald-green); margin: 0;">Il Nostro Catalogo</h2>
        <p style="color: var(--text-muted);">Tutti i prodotti rigorosamente selezionati</p>
    </div>

    <main class="product-grid">
        {{range .}}
        <div class="product-card">
            <img src="{{.ImageURL}}" alt="{{.Name}}">
            <div class="card-content">
                <h3>{{.Name}}</h3>
                <p>{{.Description}}</p>
                {{if .AffiliateLink}}
                <a href="{{.AffiliateLink}}" target="_blank" class="buy-btn">Acquista Ora</a>
                {{end}}
            </div>
        </div>
        {{end}}
    </main>
</body>
</html>
