<!DOCTYPE html>

<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazahal | L'eccellenza Halal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <a href="/upload" class="nav-link">+ Aggiungi Prodotto</a>
        <a href="/login" class="nav-link">Login</a>
    </nav> 

    <main class="product-grid">
        {{range .}}
        <div class="product-card">
            <img src="{{.ImageURL}}" alt="{{.Name}}">
            <div class="card-content">
                <h3>{{.Name}}</h3>
                <p>{{.Description}}</p>
                {{if .AffiliateLink}}
                <a href="{{.AffiliateLink}}" target="_blank" class="buy-btn">Acquista Ora</a>
                {{end}}
            </div>
        </div>
        {{end}}
    </main>
</html>
