<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Bazahal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <a href="/" class="nav-link">Torna alla Home</a>
    </nav>

    <div class="form-container">
        <h2 style="margin-top:0; margin-bottom:30px; font-size: 2.2rem; color: var(--emerald-green); letter-spacing: -1px;">Login</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Es. admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="La tua password">
            </div>
            <button type="submit" class="submit-btn">Accedi</button>
        </form>
    </div>
</body>
</html>
