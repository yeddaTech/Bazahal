<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Prodotto | Bazahal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <a href="/" class="nav-link">Torna alla Home</a>
    </nav>

    <div class="form-container">
        <h2 style="margin-top:0; margin-bottom:30px; font-size: 2rem; color: var(--emerald-green);">Nuovo Prodotto</h2>
        <form action="/upload" method="POST">
            <div class="form-group">
                <label>Nome Prodotto</label>
                <input type="text" name="name" required placeholder="Es. Datteri Ajwa">
            </div>
            <div class="form-group">
                <label>Descrizione</label>
                <textarea name="description" rows="3" required placeholder="Perché le persone dovrebbero comprarlo?"></textarea>
            </div>
            <div class="form-group">
                <label>Link Immagine (URL)</label>
                <input type="url" name="image_url" required placeholder="Es. https://sito.com/immagine.jpg">
            </div>
            <div class="form-group">
                <label>Il Tuo Link Affiliato (Per guadagnare)</label>
                <input type="url" name="affiliate_link" required placeholder="Es. https://amazon.it/tuo-link">
            </div>
            <button type="submit" class="submit-btn">Pubblica Prodotto</button>
        </form>
    </div>
</body>
</html>
