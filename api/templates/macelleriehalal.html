<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trova Halal | Bazahal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .map-section { padding: 40px 5%; text-align: center; }
        
        .search-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .search-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid var(--emerald-green);
            width: 300px;
            font-size: 1rem;
            outline: none;
        }

        .map-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(14, 166, 114, 0.1);
            border: 1px solid rgba(14, 166, 114, 0.1);
        }

        iframe { 
            width: 100%; 
            height: 550px; 
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <div>
            <a href="/orari" class="nav-link" style="margin-right: 15px;">Orari</a>
            <a href="/shop" class="nav-link" style="margin-right: 15px;">Shop</a>
            <a href="/login" class="nav-link">Login</a>
        </div>
    </nav>

    <header class="hero" style="background-image: url('https://images.unsplash.com/photo-1534120247760-c44c3e4a62f1?q=80&w=1470&auto=format&fit=crop'); min-height: 30vh; padding: 80px 20px 40px;">
        <div class="hero-content">
            <div class="bismillah">بسم الله الرحمن الرحيم</div>
            <h1>Cerca Halal<br><span>Nella tua città.</span></h1>
            <p>Inserisci la tua città per vedere subito le macellerie e i ristoranti più vicini.</p>
        </div>
    </header>

    <section class="map-section">
        <div class="search-container">
            <input type="text" id="cityInput" class="search-input" placeholder="Esempio: Milano, Roma, Torino...">
            <button onclick="cercaCitta()" class="buy-btn" style="cursor: pointer; border: none;">Cerca</button>
        </div>

        <div class="map-wrapper" id="map-container">
            <iframe 
                id="mapFrame"
                src="https://maps.google.com/maps?q=macelleria+halal+italia&t=&z=6&ie=UTF8&iwloc=&output=embed" 
                allowfullscreen>
            </iframe>
        </div>
    </section>
<script>
    function cercaCitta() {
        const citta = document.getElementById('cityInput').value;
        if (citta.trim() === "") {
            alert("Per favore, inserisci il nome di una città.");
            return;
        }

        // Creiamo la ricerca specifica
        const termineRicerca = "macelleria+ristorante+halal+" + citta.replace(/\s+/g, '+');
        
        // Questo URL è più potente e forza Google a mostrare i risultati locali
        const embedUrl = `https://maps.google.com/maps?q=${termineRicerca}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
        
        const container = document.getElementById('map-container');
        
        // Aggiorniamo l'iframe con un piccolo trucco per "forzare" il ricaricamento
        container.innerHTML = `
            <iframe 
                id="mapFrame"
                src="${embedUrl}" 
                allowfullscreen
                style="width:100%; height:550px; border:none;">
            </iframe>
        `;
    }

    // Permetti di premere "Invio"
    document.getElementById("cityInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            cercaCitta();
        }
    });
</script>

</body>
</html>
