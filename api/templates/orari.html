<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orari Preghiera | Bazahal</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body style="background-image: url('https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?q=80&w=1470&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; min-height: 100vh; display: flex; flex-direction: column;">
    
    <nav class="navbar">
        <a href="/" class="logo">Bazahal<span>.</span></a>
        <div>
            <a href="/orari" class="nav-link" style="margin-right: 15px; color: var(--gold-accent);">Orari</a>
            <a href="/shop" class="nav-link" style="margin-right: 15px;">Shop</a>
            <a href="/login" class="nav-link">Login</a>
        </div>
    </nav>

    <div style="flex-grow: 1; background: rgba(20, 33, 24, 0.85); padding: 80px 20px; display: flex; align-items: center; justify-content: center;">
        
        <div class="prayer-container" style="width: 100%; max-width: 1000px; flex-direction: column; text-align: center; padding: 50px 40px; background: transparent; box-shadow: none;">
            
            <div class="prayer-header" style="margin-bottom: 50px;">
                <div class="bismillah" style="margin-bottom: 15px; font-size: 1.8rem; color: white;">بسم الله الرحمن الرحيم</div>
                <h3 style="font-size: 3rem; margin-bottom: 10px; color: white; letter-spacing: -1px;">Orari della Preghiera</h3>
                <p id="prayer-date" style="font-size: 1.2rem; color: white;">Caricamento data...</p>
                <p id="user-location" style="font-size: 1rem; margin-top: 10px; color: white; opacity: 0.9;">📍 Rilevamento della tua posizione...</p>
            </div>
            
            <div class="prayer-grid" id="prayer-grid" style="display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 40px; width: 100%;">
                <p style="color: white; opacity: 0.9; font-size: 1.1rem;">In attesa di calcolare gli orari...</p>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const grid = document.getElementById('prayer-grid');
            const locationText = document.getElementById('user-location');
            const dateText = document.getElementById('prayer-date');

            function fetchPrayerTimes(lat, lng, cityName) {
                fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=3`)
                    .then(response => response.json())
                    .then(data => {
                        const timings = data.data.timings;
                        const hijri = data.data.date.hijri;
                        
                        dateText.innerText = `${hijri.day} ${hijri.month.en} ${hijri.year}`;
                        locationText.innerText = `📍 ${cityName}`;

                        // Icone Premium SVG
                        const iconFajr = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><path d="M4.22 10.22l1.42 1.42"/><path d="M18.36 10.22l-1.42 1.42"/><path d="M22 18H2"/><path d="M8 18a4 4 0 1 1 8 0"/></svg>`;
                        const iconDhuhr = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
                        const iconAsr = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>`;
                        const iconMaghrib = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/></svg>`;
                        const iconIsha = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

                        const prayers = [
                            { name: 'Fajr', time: timings.Fajr, icon: iconFajr },
                            { name: 'Dhuhr', time: timings.Dhuhr, icon: iconDhuhr },
                            { name: 'Asr', time: timings.Asr, icon: iconAsr },
                            { name: 'Maghrib', time: timings.Maghrib, icon: iconMaghrib },
                            { name: 'Isha', time: timings.Isha, icon: iconIsha }
                        ];

                        grid.innerHTML = ''; 

                        prayers.forEach(prayer => {
                            grid.innerHTML += `
                                <div class="prayer-card" style="flex: 1 1 150px; min-width: 120px; text-align: center; background: transparent; border: none; box-shadow: none;">
                                    <span class="prayer-icon" style="display: block; margin-bottom: 12px;">${prayer.icon}</span>
                                    <span class="prayer-name" style="font-size: 1.4rem; color: white; display: block; margin-bottom: 5px; opacity: 0.9;">${prayer.name}</span>
                                    <span class="prayer-time" style="font-size: 2.2rem; font-weight: bold; color: white; display: block; letter-spacing: 1px;">${prayer.time}</span>
                                </div>
                            `;
                        });
                    })
                    .catch(error => {
                        grid.innerHTML = '<p style="color: white;">Impossibile caricare gli orari. Controlla la connessione.</p>';
                    });
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=it`)
                            .then(res => res.json())
                            .then(geoData => {
                                const city = geoData.city || geoData.locality || "La tua posizione esatta";
                                fetchPrayerTimes(lat, lng, city + ", " + geoData.countryCode);
                            })
                            .catch(() => {
                                fetchPrayerTimes(lat, lng, "Posizione Rilevata");
                            });
                    },
                    function(error) {
                        locationText.innerText = "📍 Posizione negata. Mostro: Milano, IT";
                        fetchPrayerTimes(45.4642, 9.1900, "Milano, IT");
                    }
                );
            } else {
                locationText.innerText = "📍 Geolocalizzazione non supportata. Mostro: Milano, IT";
                fetchPrayerTimes(45.4642, 9.1900, "Milano, IT");
            }
        });
    </script>
</body>
</html>
