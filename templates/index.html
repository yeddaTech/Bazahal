<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Halal Shop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="header-titles">
        <h1>Halal Shop</h1>
        <p>100% Halal Certified Products</p>
    </div>
    <div class="header-actions">
        <a href="/upload" class="upload-btn">Carica Prodotto</a>
    </div>
</header>

<div class="container">
    {{range .}}
    <div class="card">
        <img src="{{if .ImageURL}}{{.ImageURL}}{{else}}https://images.unsplash.com/photo-1603048297172-c92544798d5a{{end}}" alt="{{.Name}}">
        <div class="card-content">
            <h3>{{.Name}}</h3>
            <p>{{.Description}}</p>
        </div>
        <a href="#" class="buy-btn">Acquista</a>
    </div>
    {{else}}
        <div class="empty-state">
            <h3>Nessun prodotto trovato.</h3>
        </div>
    {{end}}
</div>

</body>
</html>
